services:
  mongodb:
    image: mongo:7
    container_name: page-plus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: page-plus-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongodb:27017/page-plus
      JWT_SECRET: super_secret_key_for_jwt_token_12345
      JWT_EXPIRE: 30d
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./Backend/src:/app/src
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: page-plus-frontend
    ports:
      - "5000:5000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

volumes:
  mongodb_data:
